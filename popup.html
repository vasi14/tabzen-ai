<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabZen AI</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="icon">✨</span>
        <h1>TabZen AI</h1>
      </div>
      <div class="subtitle">Agentic Tab Janitor</div>
    </header>

    <div class="settings-section">
      <div class="input-group">
        <label for="apiKey">Gemini API Key</label>
        <div class="key-input-wrapper">
          <input type="password" id="apiKey" placeholder="Paste your API key here...">
          <button id="saveKeyBtn" class="secondary-btn">Save</button>
        </div>
        <div id="keyStatus" class="status-msg"></div>
      </div>
    </div>

    <div class="action-section">
      <div class="input-group">
        <label for="promptInput">What should I do with your tabs?</label>
        <textarea id="promptInput" rows="2" placeholder="e.g., Organize my tabs into workspaces and close duplicates..."></textarea>
        <button id="runAgentBtn" class="primary-btn">
          <span class="btn-text">Run Agent</span>
          <span class="loader hidden"></span>
        </button>
      </div>
    </div>

    <div class="terminal-container">
      <div class="terminal-header">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <span>Agent Reasoning Chain</span>
      </div>
      <div class="terminal-body" id="consoleOutput">
        <div class="log-entry system">System initialized. Waiting for prompt...</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
